# TV Looker Database Configuration
# Author: TV Looker Team
# Version: 1.0
# Since: 2026-02-24

# Application Configuration
spring.application.name=tv-looker
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/tv-looker-db
spring.datasource.username=tv-looker-admin
spring.datasource.password=this-is-a-super-secure-password123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.tvlooker=DEBUG

# Additional Configuration
debug=true

# ========================================================================================
# RECOMMENDATION ENGINE CONFIGURATION
# ========================================================================================

# Strategy Enable/Disable Configuration
# Set to false to disable a specific recommendation strategy
recommendation.strategies.popularity.enabled=true
# recommendation.strategies.content.enabled=true
# recommendation.strategies.item-collaborative.enabled=true
# recommendation.strategies.user-collaborative.enabled=true
# recommendation.strategies.matrix-factorization.enabled=true

# Aggregation Type Selection
# Options: constant, variable, ranking
recommendation.aggregation.type=constant

# Constant Convex Combination Weights
# Must sum to 1.0 for valid configuration
# Adjust weights to prioritize different recommendation strategies
recommendation.weights.popularity=0.15
recommendation.weights.content=0.25
recommendation.weights.item-collaborative=0.25
recommendation.weights.user-collaborative=0.25
recommendation.weights.matrix-factorization=0.10

# ========================================================================================
# TMDB API CONFIGURATION
# ========================================================================================

# TMDB API Authentication (API Read Access Token v4)
# Get yours at: https://www.themoviedb.org/settings/api
# Set via environment variable for security: TMDB_API_KEY=your-token
tmdb.api.key=eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzZWMwMWI4ZDk5MjVjZmNlYzFjNjM3NzI3NzIwZTQ0MCIsIm5iZiI6MTc3MzUyODUyMy41MDcsInN1YiI6IjY5YjVlNWNiNjg0ZDhiM2Y0MTNiOTI1MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.SV60Bbl4yBIEOOrBHg9aLGrzg_5jRX_WSoG3GiXFsIQ
tmdb.api.base-url=https://api.themoviedb.org/3/

# Language for TMDB responses (titles, overviews, etc.)
tmdb.api.language=es-MX

# Collector: initial bulk load configuration
# Set to true to run the collector when the application starts
tmdb.collector.run-on-startup=true
# Max pages to fetch per category (20 items/page)
tmdb.collector.max-pages=50
# Delay between API calls in ms (~25 req/s, safely under TMDB's 40 req/s limit)
tmdb.collector.request-delay-ms=40

# Synchronizer: periodic sync configuration
# Whether the synchronizer is enabled
tmdb.sync.enabled=true
# Sync interval in ms (default: 24 hours)
tmdb.sync.interval-ms=604800000
# Initial delay before first sync in ms (default: 60 seconds)
tmdb.sync.initial-delay-ms=60000
# Pages of popular items to check for new content during sync
tmdb.sync.popular-pages=5

